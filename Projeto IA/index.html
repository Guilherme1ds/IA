<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Análise de Sentimentos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Sistema de Análise de Sentimentos</h1>
    </header>
    <main class="container">
        <section class="input-area">
            <label for="user-text">Digite seu texto:</label>
            <textarea id="user-text" rows="6" placeholder="Escreva algo..."></textarea>
            <button class="btn-analisar">Analisar</button>
        </section>
        <section class="result-area">
            <h2>Resultado</h2>
            <div class="result neutro">Neutro</div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
